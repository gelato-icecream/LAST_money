<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0f172a">
    <title>Restaurant Split & Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-dark: #0f172a;
    --bg-card: rgba(30, 41, 59, 0.7);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent: #10b981;
    --accent-glow: rgba(16, 185, 129, 0.4);
    --danger: #ef4444;
    --border: rgba(255, 255, 255, 0.1);
    --glass-blur: blur(12px);
    --transition: all 0.3s ease;
    --bg-modal: #1e293b;
    --bg-app-gradient: radial-gradient(circle at top right, #1e293b 0%, var(--bg-dark) 100%);
}

.light-mode {
    --bg-dark: #f1f5f9;
    --bg-card: rgba(255, 255, 255, 0.7);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --border: rgba(0, 0, 0, 0.1);
    --bg-modal: #ffffff;
    --bg-app-gradient: radial-gradient(circle at top right, #e2e8f0 0%, var(--bg-dark) 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background-color: var(--bg-dark); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

#app { width: 100%; max-width: 600px; margin: 0 auto; position: relative; min-height: 100vh; background: var(--bg-app-gradient); }

.screen { display: none; flex-direction: column; min-height: 100vh; padding-bottom: calc(140px + env(safe-area-inset-bottom)); animation: fadeIn 0.3s ease-out; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

header { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

main { padding: 0 20px; flex: 1; }

.card-grid { display: grid; gap: 15px; grid-template-columns: 1fr; }

/* Input fields */
.input-group { margin-bottom: 20px; }
.input-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.input-group input, .input-group select { width: 100%; background: rgba(128, 128, 128, 0.1); border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; color: var(--text-primary); font-size: 16px; outline: none; transition: border-color 0.2s; appearance: none; }
.input-group input:focus, .input-group select:focus { border-color: var(--accent); }
.input-group select option { background: var(--bg-modal); color: var(--text-primary); }

.flex-row { display: flex; gap: 10px; }
.flex-1 { flex: 1; }

.btn-primary { background: var(--accent); color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-align: center; }
.btn-primary.w-100 { width: 100%; display: block; }
.btn-text { background: none; color: var(--text-secondary); padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
.icon-btn { background: none; border: none; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 50%; transition: var(--transition); }
.icon-btn:active { background: var(--border); }

/* Wallet Cards */
.wallet-card { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
.wallet-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); transform: translate(10%, 10%); pointer-events: none; }
.wallet-card-info h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
.wallet-card-balance { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 1px; }
.wallet-card-actions { display: flex; gap: 10px; z-index: 2; }

/* Dashboard Cards (for calculator results) */
.result-card { background: var(--bg-card); backdrop-filter: var(--glass-blur); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; text-align: center; }
.result-card h2 { font-size: 14px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.result-card .amount { font-size: 48px; font-weight: 700; color: var(--accent); }
.result-card .details { font-size: 14px; color: var(--text-secondary); display: flex; flex-direction: column; gap: 4px; width: 100%; border-top: 1px solid var(--border); padding-top: 15px; margin-top: 5px; }
.result-card .detail-row { display: flex; justify-content: space-between; }

.fab { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); right: 30px; width: 60px; height: 60px; border-radius: 30px; background: var(--accent); color: #fff; border: none; box-shadow: 0 8px 20px var(--accent-glow); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: var(--transition); }
.fab:active { transform: scale(0.95); }

/* Bottom Navigation */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; height: calc(60px + env(safe-area-inset-bottom)); background: var(--bg-card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 90; }
.nav-item { background: none; border: none; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; cursor: pointer; flex: 1; height: 100%; justify-content: center; transition: color 0.3s ease; }
.nav-item.active { color: var(--accent); }

/* Modals */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }
.modal-overlay.active { display: flex; opacity: 1; }
.modal { background: var(--bg-modal); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s ease; }
.modal-overlay.active .modal { transform: translateY(0); }
.modal h2 { font-size: 20px; margin-bottom: 20px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div id="app">
        <!-- Calculator Screen -->
        <div id="calculator-screen" class="screen active">
            <header>
                <div>
                    <h1>Split Bill</h1>
                    <p>Calculate tips, surcharges & split payments</p>
                </div>
                <button class="icon-btn" onclick="app.toggleTheme()" id="theme-btn" aria-label="Toggle Theme">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </header>
            <main>
                <div class="input-group">
                    <label>Select Gift Card to Empty</label>
                    <select id="calc-gift-card" onchange="app.handleCardSelect()">
                        <option value="">None / Manual Entry</option>
                        <!-- Cards injected here -->
                    </select>
                </div>
                
                <div class="input-group" id="manual-gift-card-group">
                    <label>Target Amount to Spend ($)</label>
                    <input type="number" id="calc-gift-card-amount" step="0.01" placeholder="e.g. 10.00" oninput="app.calculateSplit()">
                </div>

                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Surcharge / Tip (%)</label>
                        <input type="number" id="calc-surcharge-pct" step="0.1" placeholder="e.g. 1" oninput="app.calculateSplit()">
                    </div>
                    <div class="input-group flex-1">
                        <label>Surcharge ($)</label>
                        <input type="number" id="calc-surcharge-fixed" step="0.01" placeholder="e.g. 0.00" oninput="app.calculateSplit()">
                    </div>
                </div>

                <div class="result-card">
                    <h2>Tell Cashier to Charge</h2>
                    <div class="amount" id="result-charge">$0.00</div>
                    <div class="details">
                        <div class="detail-row">
                            <span>Plus Surcharge:</span>
                            <span id="res-surcharge">+$0.00</span>
                        </div>
                        <div class="detail-row" style="font-weight: 600; margin-top: 4px; padding-top: 4px; border-top: 1px dashed var(--border);">
                            <span>Total (Empties Card):</span>
                            <span id="res-total">$0.00</span>
                        </div>
                    </div>
                    <button class="btn-primary w-100" style="margin-top: 15px;" id="btn-deduct-card" onclick="app.deductFromCard()" disabled>Deduct from Gift Card</button>
                </div>
            </main>
        </div>

        <!-- Wallet Screen -->
        <div id="wallet-screen" class="screen">
            <header>
                <div>
                    <h1>Wallet</h1>
                    <p>Track your restaurant gift cards</p>
                </div>
            </header>
            <main>
                <div id="cards-list" class="card-grid">
                    <!-- Cards rendered here -->
                </div>
            </main>
            <button class="fab" onclick="ui.showModal('add-card-modal')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>

        <!-- Modals -->
        <div id="add-card-modal" class="modal-overlay">
            <div class="modal">
                <h2>Add Gift Card</h2>
                <form id="add-card-form" onsubmit="app.handleAddCard(event)">
                    <div class="input-group">
                        <label>Card Name / Restaurant</label>
                        <input type="text" id="card-name" required placeholder="e.g. Starbucks, McDonalds">
                    </div>
                    <div class="input-group">
                        <label>Current Balance ($)</label>
                        <input type="number" id="card-balance" step="0.01" required placeholder="25.00">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-text" onclick="ui.hideModal('add-card-modal')">Cancel</button>
                        <button type="submit" class="btn-primary">Add Card</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="edit-card-modal" class="modal-overlay">
            <div class="modal">
                <h2>Edit Gift Card</h2>
                <form id="edit-card-form" onsubmit="app.handleEditCard(event)">
                    <input type="hidden" id="edit-card-id">
                    <div class="input-group">
                        <label>Card Name / Restaurant</label>
                        <input type="text" id="edit-card-name" required>
                    </div>
                    <div class="input-group">
                        <label>Current Balance ($)</label>
                        <input type="number" id="edit-card-balance" step="0.01" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-text text-danger" onclick="app.deleteCard()" style="color: var(--danger);">Delete</button>
                        <div style="display:flex; gap:10px;">
                            <button type="button" class="btn-text" onclick="ui.hideModal('edit-card-modal')">Cancel</button>
                            <button type="submit" class="btn-primary">Save</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-calculator-screen" onclick="ui.showScreen('calculator-screen')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
                <span>Calculator</span>
            </button>
            <button class="nav-item" id="nav-wallet-screen" onclick="ui.showScreen('wallet-screen')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                <span>Wallet</span>
            </button>
        </nav>
    </div>

    <script>
// Data Management
let wallets = JSON.parse(localStorage.getItem('restaurant_wallets')) || [];

const saveToLocal = () => {
    localStorage.setItem('restaurant_wallets', JSON.stringify(wallets));
};

const generateId = () => Math.random().toString(36).substr(2, 9);
const formatMoney = (amount) => '$' + parseFloat(amount).toFixed(2);

// UI Controller
const ui = {
    showScreen: (screenId) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const navItem = document.getElementById('nav-' + screenId);
        if (navItem) navItem.classList.add('active');

        if (screenId === 'wallet-screen') {
            app.renderWallet();
        } else if (screenId === 'calculator-screen') {
            app.renderCardSelect();
            app.calculateSplit();
        }
    },
    showModal: (modalId) => document.getElementById(modalId).classList.add('active'),
    hideModal: (modalId) => document.getElementById(modalId).classList.remove('active')
};

// App Logic
const app = {
    init: () => {
        const theme = localStorage.getItem('restaurant_theme');
        if (theme === 'light') {
            document.body.classList.add('light-mode');
            app.updateThemeIcon('light');
        } else {
            app.updateThemeIcon('dark');
        }
        app.renderWallet();
        app.renderCardSelect();
        app.calculateSplit();
    },

    toggleTheme: () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('restaurant_theme', isLight ? 'light' : 'dark');
        app.updateThemeIcon(isLight ? 'light' : 'dark');
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) {
            metaThemeColor.setAttribute('content', isLight ? '#f1f5f9' : '#0f172a');
        }
    },

    updateThemeIcon: (theme) => {
        const btn = document.getElementById('theme-btn');
        if (!btn) return;
        if (theme === 'light') {
            btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        } else {
            btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
        }
    },

    // Wallet functions
    renderWallet: () => {
        const list = document.getElementById('cards-list');
        list.innerHTML = '';
        if (wallets.length === 0) {
            list.innerHTML = `<div class="empty-state"><p>No gift cards added yet.</p></div>`;
            return;
        }

        wallets.forEach(card => {
            const el = document.createElement('div');
            el.className = 'wallet-card';
            el.innerHTML = `
                <div class="wallet-card-info">
                    <h3>${card.name}</h3>
                    <div class="wallet-card-balance">${formatMoney(card.balance)}</div>
                </div>
                <div class="wallet-card-actions">
                    <button class="icon-btn" onclick="app.openEditCard('${card.id}')" style="background: rgba(255,255,255,0.2); color: #fff;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                </div>
            `;
            list.appendChild(el);
        });
    },

    handleAddCard: (e) => {
        e.preventDefault();
        const card = {
            id: generateId(),
            name: document.getElementById('card-name').value,
            balance: parseFloat(document.getElementById('card-balance').value) || 0
        };
        wallets.push(card);
        saveToLocal();
        ui.hideModal('add-card-modal');
        e.target.reset();
        app.renderWallet();
        app.renderCardSelect();
    },

    openEditCard: (id) => {
        const card = wallets.find(c => c.id === id);
        if (!card) return;
        document.getElementById('edit-card-id').value = card.id;
        document.getElementById('edit-card-name').value = card.name;
        document.getElementById('edit-card-balance').value = card.balance;
        ui.showModal('edit-card-modal');
    },

    handleEditCard: (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-card-id').value;
        const card = wallets.find(c => c.id === id);
        if (card) {
            card.name = document.getElementById('edit-card-name').value;
            card.balance = parseFloat(document.getElementById('edit-card-balance').value) || 0;
            saveToLocal();
            ui.hideModal('edit-card-modal');
            app.renderWallet();
            app.renderCardSelect();
            app.calculateSplit();
        }
    },

    deleteCard: () => {
        const id = document.getElementById('edit-card-id').value;
        if(confirm('Are you sure you want to delete this card?')) {
            wallets = wallets.filter(c => c.id !== id);
            saveToLocal();
            ui.hideModal('edit-card-modal');
            app.renderWallet();
            app.renderCardSelect();
            app.calculateSplit();
        }
    },

    // Calculator Functions
    renderCardSelect: () => {
        const select = document.getElementById('calc-gift-card');
        const currentVal = select.value;
        select.innerHTML = '<option value="">None / Manual Entry</option>';
        wallets.forEach(card => {
            select.innerHTML += `<option value="${card.id}">${card.name} (${formatMoney(card.balance)})</option>`;
        });
        if (wallets.find(c => c.id === currentVal)) {
            select.value = currentVal;
        }
    },

    handleCardSelect: () => {
        const cardId = document.getElementById('calc-gift-card').value;
        const manualAmtInput = document.getElementById('calc-gift-card-amount');
        if (cardId) {
            const card = wallets.find(c => c.id === cardId);
            if (card) {
                manualAmtInput.value = card.balance.toFixed(2);
            }
        }
        app.calculateSplit();
    },

    calculateSplit: () => {
        const surPct = parseFloat(document.getElementById('calc-surcharge-pct').value) || 0;
        const surFixed = parseFloat(document.getElementById('calc-surcharge-fixed').value) || 0;
        const targetTotal = parseFloat(document.getElementById('calc-gift-card-amount').value) || 0;
        const cardId = document.getElementById('calc-gift-card').value;
        
        let chargeAmt = 0;
        let surchargeAmt = 0;
        let finalTotal = 0;

        if (targetTotal > surFixed) {
            chargeAmt = (targetTotal - surFixed) / (1 + (surPct / 100));
            chargeAmt = Math.round(chargeAmt * 100) / 100;
            surchargeAmt = (chargeAmt * (surPct / 100)) + surFixed;
            surchargeAmt = Math.round(surchargeAmt * 100) / 100;
            finalTotal = chargeAmt + surchargeAmt;
        }

        document.getElementById('result-charge').textContent = formatMoney(chargeAmt);
        document.getElementById('res-surcharge').textContent = '+' + formatMoney(surchargeAmt);
        document.getElementById('res-total').textContent = formatMoney(finalTotal);

        const deductBtn = document.getElementById('btn-deduct-card');
        if (cardId && finalTotal > 0) {
            deductBtn.disabled = false;
            deductBtn.textContent = `Deduct $${finalTotal.toFixed(2)} from Card`;
        } else {
            deductBtn.disabled = true;
            deductBtn.textContent = `Deduct from Gift Card`;
        }
    },

    deductFromCard: () => {
        const cardId = document.getElementById('calc-gift-card').value;
        if (!cardId) return;
        
        const targetTotal = parseFloat(document.getElementById('calc-gift-card-amount').value) || 0;
        const surPct = parseFloat(document.getElementById('calc-surcharge-pct').value) || 0;
        const surFixed = parseFloat(document.getElementById('calc-surcharge-fixed').value) || 0;
        
        let chargeAmt = (targetTotal - surFixed) / (1 + (surPct / 100));
        chargeAmt = Math.round(chargeAmt * 100) / 100;
        let surchargeAmt = Math.round(((chargeAmt * (surPct / 100)) + surFixed) * 100) / 100;
        let finalTotal = chargeAmt + surchargeAmt;

        const card = wallets.find(c => c.id === cardId);
        
        if (finalTotal > 0 && confirm(`Deduct $${finalTotal.toFixed(2)} from ${card.name}?`)) {
            card.balance -= finalTotal;
            saveToLocal();
            
            document.getElementById('calc-surcharge-pct').value = '';
            document.getElementById('calc-surcharge-fixed').value = '';
            document.getElementById('calc-gift-card').value = '';
            document.getElementById('calc-gift-card-amount').value = '';
            
            app.renderCardSelect();
            app.calculateSplit();
            alert(`Successfully deducted $${finalTotal.toFixed(2)}. New balance is $${card.balance.toFixed(2)}.`);
        }
    }
};
